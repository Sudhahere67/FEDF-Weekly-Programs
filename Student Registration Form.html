<html>
      <head>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #f5f5f5;
            }

            form {
                background: white;
                width: 400px;
                margin: 40px auto;
                padding: 30px;
                border: 1px solid #ccc;
                border-radius: 8px;
            }

            h1 {
                text-align: center;
                margin-bottom: 20px;
            }

            input[type="text"],
            input[type="email"],
            input[type="password"],
            input[type="date"],
            select,
            textarea {
                width: 100%;
                padding: 8px;
                margin: 6px 0 14px 0;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
            }

            textarea {
                height: 80px;
            }

            input[type="submit"] {
                background: #2c3e50;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

            input[type="reset"] {
                padding: 10px 20px;
                border: 1px solid #ccc;
                border-radius: 4px;
                cursor: pointer;
            }
        </style>
      </head>
      <body>
        <form>
            <h1>Student Registration form</h1>
            Full name
            <input type="text" id="name" placeholder="Enter name:"><br><br>
            Email
            <input type="email" id="email" name="email" placeholder="Enter Email:"><br><br>
            Password
            <input type="password" id="password" name="password" placeholder="Enter password:"><br><br>
            Date Of Birth
            <input type="date" id="date" name="date" placeholder="Enter DOB"><br><br>
            Gender:
            Male<input type="radio" id="Male">
            Female<input type="radio" id="Female" ><br><br>
            Select cource:<select>
                <option>CSE</option>
                <option>AI&DS</option>
                <option>CSIT</option>
                <option>ECE</option>
            </select><br><br>

            <textarea placeholder="Enter address:"></textarea><br><br>
            <input type="submit" value="submit">
            <input type="reset" value="reset">
        </form>
      </body>
</html>

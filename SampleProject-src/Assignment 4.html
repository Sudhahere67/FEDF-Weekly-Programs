<!DOCTYPE html>
<html>
<head>
    <title>Student Result Processing System</title>
</head>
<body>

<h1>Student Results</h1>
<div id="output"></div>

<script>
    // Student class
    class Student {
        constructor(name, sem1Marks, sem2Marks) {
            this.name = name;

            // Spread operator to merge marks
            this.marks = [...sem1Marks, ...sem2Marks];
        }

        // Arrow function to calculate total
        calculateTotal = () => {
            return this.marks.reduce((sum, mark) => sum + mark, 0);
        }

        // Arrow function to calculate average
        calculateAverage = () => {
            return this.calculateTotal() / this.marks.length;
        }
    }

    // Create student records
    const student1 = new Student("Rahul", [80, 75, 90], [85, 70, 88]);
    const student2 = new Student("Anita", [60, 70, 65], [75, 80, 78]);
    const student3 = new Student("Vikram", [90, 92, 88], [85, 87, 91]);

    const students = [student1, student2, student3];

    const outputDiv = document.getElementById("output");

    // Display results
    students.forEach(student => {

        // Destructuring
        const { name, marks } = student;

        const total = student.calculateTotal();
        const average = student.calculateAverage().toFixed(2);

        // Template literals
        const result = `
            <p>
                <strong>Name:</strong> ${name} <br>
                <strong>Marks:</strong> ${marks.join(", ")} <br>
                <strong>Total:</strong> ${total} <br>
                <strong>Average:</strong> ${average}
            </p>
            <hr>
        `;

        outputDiv.innerHTML += result;
    });
</script>

</body>
</html>
